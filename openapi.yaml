openapi: 3.2.0
info:
  title: Swagger AWS Shop - OpenAPI 3.2
  description: |-
    This is a AWS Shop Server based on the OpenAPI 3.2 specification.

    Some useful links:
    - [The AWS Shop repository](https://github.com/alexintech/aws-shop-backend)
    - [OpenAPI 3.2 Specification](https://spec.openapis.org/oas/v3.2.0.html)

  version: 0.1.0
servers:
  - url: https://8vu5lh7wgf.execute-api.us-east-1.amazonaws.com/prod/
    description: Production server (OAS 3.2)
tags:
  - name: product
    summary: Product management operations
    description: Everything about Products
paths:
  /products:
    get:
      tags:
        - product
      summary: Returns all products.
      description: Returns all products.
      operationId: getProductsList
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags:
        - product
      summary: Add a new product to the shop.
      description: Add a new product to the shop.
      operationId: createProduct
      requestBody:
        description: Create a new Product in the shop
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
        required: true
      responses:
        '201':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
        '422':
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /products/{productId}:
    get:
      tags:
        - product
      summary: Find product by identifier.
      description: Returns a single product.
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          description: ID of product to return
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid ID supplied
        '404':
          description: Product not found
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Product:
      required:
        - title
        - price
        - count
      type: object
      properties:
        id:
          type: string
          examples: [10]
        title:
          type: string
          examples: ['Product title']
        description:
          type: string
          examples: ['Short description']
        price:
          type: number
          format: int32
          examples: [15]
        count:
          type: number
          format: int32
          examples: [0]
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message

